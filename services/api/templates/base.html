<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-family: 'Inter', sans-serif;
                font-size: 10pt;
                color: #6b7280;
            }
        }
        
        :root {
            --risk-high: #ef4444;
            --risk-medium: #f59e0b;
            --risk-low: #10b981;
            --risk-safe: #6b7280;
            --primary: #1e40af;
            --text-main: #111827;
            --text-muted: #4b5563;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3, h4 {
            color: var(--primary);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            page-break-after: avoid;
        }

        .section {
            margin-bottom: 2em;
            page-break-inside: avoid;
        }

        .risk-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            color: white;
        }

        .risk-high { background-color: var(--risk-high); }
        .risk-medium { background-color: var(--risk-medium); }
        .risk-low { background-color: var(--risk-low); }
        .risk-safe { background-color: var(--risk-safe); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f9fafb;
            font-weight: 600;
            color: var(--text-muted);
        }

        .page-break {
            page-break-before: always;
        }

        .footer {
            margin-top: 3em;
            padding-top: 1em;
            border-top: 1px solid #e5e7eb;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
        }

        .logo {
            max-width: 150px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        {{ i18n.generated_by }} ContractIQ | {{ i18n.confidential }}
    </div>
</body>
</html>
