version: '3.8'

services:
  db:
    image: postgres:16
    container_name: legaltech-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legaltech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legaltech-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: legaltech-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python run.py

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: legaltech-ai
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./services/ai:/app

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: legaltech-worker
    env_file:
      - .env
    volumes:
      - ./apps/worker:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data:
