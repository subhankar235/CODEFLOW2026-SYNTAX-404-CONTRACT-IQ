version: '3.8'

services:
  db-test:
    image: postgres:16
    container_name: legaltech-db-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: legaltech_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: legaltech-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-test:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: legaltech-api-test
    environment:
      DATABASE_URL: postgresql+asyncpg://test:test@db-test:5432/legaltech_test
      REDIS_URL: redis://redis-test:6379
    ports:
      - "8002:8000"
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: python -m pytest